name = "rtsda-web"
compatibility_date = "2023-12-16"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm run build"
output_directory = ".vercel/output/static"

[build.upload]
format = "directory"

[site]
bucket = ".vercel/output/static"

[[rules]]
type = "mime"
glob = "**/*.js"
content_type = "application/javascript"

[[rules]]
type = "mime"
glob = "**/*.css"
content_type = "text/css"

[[rules]]
type = "mime"
glob = "**/*.html"
content_type = "text/html; charset=utf-8"

[[rules]]
type = "header"
glob = "/_next/static/**/*"
[rules.headers]
Cache-Control = "public, max-age=31536000, immutable"

[[rules]]
type = "header"
glob = "**/*.{js,css,jpg,jpeg,png,gif,ico,webp,woff2}"
[rules.headers]
Cache-Control = "public, max-age=31536000, immutable"

[[rules]]
type = "Rule"
glob = "/*"
fallthrough = true

[[rules]]
type = "Rule"
glob = "/_next/*"
cache_key = "next-static"
[rules.cache]
browser_ttl = 31536000
edge_ttl = 31536000

[[rules]]
type = "Rule"
glob = "/static/*"
cache_key = "static-assets"
[rules.cache]
browser_ttl = 31536000
edge_ttl = 31536000
