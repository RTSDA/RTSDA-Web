# Cloudflare Pages config
name = "rtsda-web"
compatibility_date = "2023-12-16"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm run build"
output_directory = ".vercel/output/static"

[site]
bucket = ".vercel/output/static"

# Configure MIME types for static files
[build.upload]
format = "directory"

[[build.upload.rules]]
type = "CompiledJavaScript"
globs = ["**/*.js"]
fallthrough = true

[[build.upload.rules]]
type = "CompiledCSS"
globs = ["**/*.css"]
fallthrough = true

[[build.upload.rules]]
type = "Text"
globs = ["**/*.{html,txt,json}"]
fallthrough = true

[[build.upload.rules]]
type = "Binary"
globs = ["**/*.{woff,woff2,ttf,otf,eot,png,jpg,jpeg,gif,ico,webp}"]
fallthrough = true
